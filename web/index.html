<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- No `viewport-fit=cover`: Flutter web doesn't feed iOS Safari's safe-area
       insets into MediaQuery.padding, so the in-app SafeArea is a no-op there.
       Letting Safari keep the layout inside the safe area stops content from
       being clipped under the notch / home indicator. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Recall — spaced-repetition review across all your devices.">
  <meta name="theme-color" content="#1B1B29">

  <!-- Preload the app bundle + CanvasKit engine so they download in parallel
       with the boot script instead of serially after it. `preload` (not
       `prefetch`) because iOS Safari ignores prefetch entirely. The `as` /
       module / crossorigin choices match how each file is actually requested
       (classic script tag, dynamic import(), emscripten fetch()) so the
       preloaded bytes are reused rather than downloaded twice. Requires the
       deploy to pin the local CanvasKit (--no-web-resources-cdn). -->
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="modulepreload" href="canvaskit/canvaskit.js">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin>

  <!-- PWA: installable to the iOS/Android home screen, standalone, dark status bar -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Recall">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Recall</title>
  <link rel="manifest" href="manifest.json">

  <!-- No-op shim for the transitive passkeys_web plugin (see passkeys_stub.js).
       Must load before Flutter's plugin registrant so init() doesn't throw. -->
  <script src="passkeys_stub.js"></script>

  <!-- Diagnostic: surface any boot error on-screen instead of a white page.
       Lets errors be read on a phone with no devtools. Harmless when the app
       loads fine (the overlay only appears if something throws). -->
  <script>
    (function () {
      function show(label, msg) {
        var d = document.getElementById('__bootErr');
        if (!d) {
          d = document.createElement('pre');
          d.id = '__bootErr';
          d.style.cssText = 'position:fixed;inset:0;z-index:2147483647;margin:0;' +
            'padding:16px;background:#1B1B29;color:#FB923C;' +
            'font:12px/1.45 ui-monospace,Menlo,monospace;white-space:pre-wrap;' +
            'overflow:auto;-webkit-overflow-scrolling:touch;';
          (document.body || document.documentElement).appendChild(d);
        }
        d.textContent += label + ': ' + msg + '\n\n';
      }
      window.addEventListener('error', function (e) {
        show('ERROR', (e.message || e.error || e) +
          (e.filename ? (' @ ' + e.filename + ':' + e.lineno) : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('PROMISE', (r && (r.stack || r.message)) || String(r));
      });
      var origErr = console.error;
      console.error = function () {
        show('console.error', Array.prototype.join.call(arguments, ' '));
        origErr.apply(console, arguments);
      };
    })();
  </script>

  <!-- Boot splash: shown immediately so the first paint isn't a blank dark
       screen while CanvasKit + fonts load. Removed on Flutter's first frame
       (with a timeout fallback so it can never get stuck). -->
  <style>
    html, body { height: 100%; margin: 0; background: #1B1B29; }
    #splash {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: #1B1B29;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      opacity: 1; transition: opacity .35s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .mark {
      width: 56px; height: 56px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background:
        repeating-linear-gradient(transparent 0 3px, rgba(255,255,255,.02) 3px 4px),
        linear-gradient(135deg, #1F1E3B, #252540);
      border: 1px solid #33345A;
      box-shadow: 0 10px 34px #FDE04738;
    }
    #splash .ring {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.12); border-top-color: #8A90FF;
      animation: splash-spin .8s linear infinite;
    }
    #splash .label { color: #95919E; font-size: 13px; letter-spacing: .2px; }
    @keyframes splash-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="mark">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
           stroke="#FDE047" stroke-width="2.4" stroke-linecap="round"
           stroke-linejoin="round">
        <path d="M12 2 2 7l10 5 10-5-10-5Z"/>
        <path d="m2 17 10 5 10-5"/>
        <path d="m2 12 10 5 10-5"/>
      </svg>
    </div>
    <div class="ring"></div>
    <div class="label">Loading Recall…</div>
  </div>
  <script>
    (function () {
      function hideSplash() {
        var s = document.getElementById('splash');
        if (!s) return;
        s.classList.add('hide');
        setTimeout(function () {
          if (s && s.parentNode) s.parentNode.removeChild(s);
        }, 400);
      }
      window.addEventListener('flutter-first-frame', hideSplash);
      // Fallback: never let the splash outlive a slow/failed boot.
      setTimeout(hideSplash, 12000);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <!-- Cache-first PWA service worker (sw.js) — replaces Flutter's deprecated
       self-unregistering one, so repeat opens on the phone paint from cache
       instead of re-negotiating every asset. Registered after load so it
       never competes with boot fetches, and never on localhost so local
       dev servers can't serve stale bundles. -->
  <script>
    if ('serviceWorker' in navigator &&
        location.hostname !== 'localhost' &&
        location.hostname !== '127.0.0.1') {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.warn('sw.js registration failed:', e);
        });
      });
    }
  </script>
</body>
</html>
