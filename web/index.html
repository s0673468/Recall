<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Recall — spaced-repetition review across all your devices.">
  <meta name="theme-color" content="#1B1B29">

  <!-- Dark everywhere the Flutter canvas doesn't paint (status-bar band, any
       safe-area inset) so the top of the PWA isn't a white strip. -->
  <style>html, body { height: 100%; margin: 0; background: #1B1B29; }</style>

  <!-- iOS / installable PWA meta tags (iOS ignores manifest.json) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Recall">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Recall</title>
  <link rel="manifest" href="manifest.json">

  <!-- No-op shim for the transitive passkeys_web plugin (see passkeys_stub.js).
       Must load BEFORE Flutter's plugin registrant so PasskeyAuthenticator.init()
       doesn't throw and white-screen the app. -->
  <script src="passkeys_stub.js"></script>

  <!-- Diagnostic: surface any boot error on-screen instead of a white page.
       Lets errors be read on a phone with no devtools. Harmless when the app
       loads fine (the overlay only appears if something throws). -->
  <script>
    (function () {
      function show(label, msg) {
        var d = document.getElementById('__bootErr');
        if (!d) {
          d = document.createElement('pre');
          d.id = '__bootErr';
          d.style.cssText = 'position:fixed;inset:0;z-index:2147483647;margin:0;' +
            'padding:16px;background:#1B1B29;color:#FB923C;' +
            'font:12px/1.45 ui-monospace,Menlo,monospace;white-space:pre-wrap;' +
            'overflow:auto;-webkit-overflow-scrolling:touch;';
          (document.body || document.documentElement).appendChild(d);
        }
        d.textContent += label + ': ' + msg + '\n\n';
      }
      window.addEventListener('error', function (e) {
        show('ERROR', (e.message || e.error || e) +
          (e.filename ? (' @ ' + e.filename + ':' + e.lineno) : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('PROMISE', (r && (r.stack || r.message)) || String(r));
      });
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
