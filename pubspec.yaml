name: health_anki_flutter
description: "Recall — cross-device spaced-repetition review for German's Anki collection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  app_links: ^7.2.1
  supabase_flutter: ^2.15.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  fl_chart: ^1.2.0
  fsrs: ^2.0.0
  flutter_math_fork: ^0.7.3
  # Small, web+Android-safe SVG renderer for the server-side `latex_svg`
  # display-math fallback (already resolved transitively; promoted to direct).
  flutter_svg: ^2.0.0
  # Used by the vendored AppSwitcher platform channels (lib/vendored/src/
  # navigation/) — promoted from transitive to direct after the move out of
  # Health, where they arrived via the health_flutter_shared path package.
  url_launcher: ^6.3.2
  web: ^1.1.1
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Test-only: MockClient (package:http/testing.dart) drives RecallApi against
  # a fake REST transport so query-building tests can assert on the PostgREST
  # query string. Already resolved transitively via supabase_flutter.
  http: ^1.4.0

flutter:
  uses-material-design: true
  assets:
    # Static Outfit + DM Sans instances. google_fonts resolves these from the
    # asset manifest instead of fetching fonts.gstatic.com at runtime, so
    # Recall paints with its real type from the first frame — critical for the
    # iPhone PWA, where the runtime fetch used to block on the network every
    # cold open. See assets/fonts/OFL.txt.
    - assets/fonts/
