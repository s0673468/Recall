name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  flutter:
    # Public repo: GitHub-hosted runners are free & unlimited. Self-hosted must
    # NEVER run on a public repo (fork PRs would execute on the M1 hub).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-flutter

      - name: flutter pub get
        run: flutter pub get

      # analyze_options treats infos/warnings as fatal, matching the local gate.
      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test --reporter=failures-only
